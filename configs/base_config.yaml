# ======================
# Default Dataset Group
# ======================
defaults:
  - _self_
  - dataset: gaussian25

train_dataset_type: "gaussian"

# ======================
# Model Configuration
# ======================
model_type: "mlp"

# MLP specific
hidden_dim: 128
time_dim: 128
num_blocks: 3
mlp:
  conditioning_type: "timestep"
  conditioning_strategy: "input_add"
  input_encoding: "raw"
  fourier_features: 256
  fourier_scale: 0.5
  fourier_seed: null
  include_input_identity: true

# UNET specific
hid_channels: 64
ch_multipliers: [1, 2]
num_res_blocks: 2
apply_attn: [False, True, True]

# ======================
# Training / DDPM Configuration
# ======================
batch_size: 10000
lr: 0.0001
noise_schedule: "linear"
train:
  max_steps: 100000
  log_every_steps: 100
  sample_every_steps: 1000
  checkpoint_every_steps: 1000
  ema_decay: 0.0
  grad_clip_norm: 1.0
  lr_warmup_steps: 0
  min_lr: 0.0001
  lr_schedule: "cosine"
  lambda_bins: 20
  sample_num_samples: 2000

optimizer:
  lr: 0.0001
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-8
  weight_decay: 0.0001

timesteps: 1000
beta_schedule: "linear"
beta_start: 0.0001
beta_end: 0.02
diffusion:
  beta_schedule: "linear"
  cosine_s: 0.008
model_mean_type: "eps"
loss_type: "mse"
model_var_type: "fixed"
score_training_method: "dsm"
model_output_parameterization: "eps"
loss:
  high_snr_top_frac: 0.0


# ======================
# System Configuration
# ======================
device: "cpu"
num_workers: 4
train_model_load_path: ""

# ======================
# Logging / Output
# ======================
seed: 42
use_wandb: false
continue_training_path: "checkpoints"
force_retrain: false

log: 
  use_wandb: false
  run_name: ""
  entity_name: "absdnd"
  project_name: "hallucination-in-diffusion-models"
